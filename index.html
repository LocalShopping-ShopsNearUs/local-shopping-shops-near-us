<!DOCTYPE html>
<html>
<head>
    <title>Local Shopping - Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#2196F3;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            padding:15px;
            text-align:center;
        }

        .card{
            background:white;
            padding:15px;
            margin:12px auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            max-width:350px;
            text-align:left;
        }

        .btn{
            background:#2196F3;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
            margin-top:8px;
        }

        .input{
            padding:10px;
            width:90%;
            margin:8px 0;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .note{
            font-size:12px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🛍️ Local Shopping</h1>
    <p>Marketplace + Shop Registration 🏪</p>
</div>

<div class="container">

    <h2>📍 Enable GPS</h2>
    <button class="btn" onclick="getLocation()">Get My Location</button>
    <p id="status" class="note"></p>

    <h2>🏪 Register Your Shop</h2>

    <div class="card">

        <input class="input" id="shopName" placeholder="Shop Name">
        <input class="input" id="shopCategory" placeholder="Category (Food, Fashion etc)">
        <input class="input" id="shopLat" placeholder="Latitude">
        <input class="input" id="shopLon" placeholder="Longitude">

        <button class="btn" onclick="registerShop()">Register Shop</button>

    </div>

    <h2>🛍️ Registered Shops</h2>
    <div id="shopList"></div>

</div>

<script>

let userLat = null;
let userLon = null;

let shops = {};

// GPS
function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(success, error);
    } else {
        alert("GPS not supported");
    }
}

function success(position){
    userLat = position.coords.latitude;
    userLon = position.coords.longitude;

    document.getElementById("status").innerText =
    "Location active ✔";
}

function error(){
    alert("Please allow GPS ❌");
}

// REGISTER SHOP
function registerShop(){

    let name = document.getElementById("shopName").value;
    let category = document.getElementById("shopCategory").value;
    let lat = parseFloat(document.getElementById("shopLat").value);
    let lon = parseFloat(document.getElementById("shopLon").value);

    if(!name || !category || !lat || !lon){
        alert("Please fill all fields");
        return;
    }

    shops[name] = {
        category: category,
        lat: lat,
        lon: lon,
        food: (category.toLowerCase() === "food")
    };

    alert("Shop Registered Successfully 🏪");

    showShops();
}

// SHOW SHOPS
function showShops(){

    let div = document.getElementById("shopList");
    div.innerHTML = "";

    for(let key in shops){

        div.innerHTML += `
        <div class="card">
            <h3>${key}</h3>
            <p>Category: ${shops[key].category}</p>
            <p>Location: ${shops[key].lat}, ${shops[key].lon}</p>
        </div>
        `;
    }
}

</script>

</body>
</html>
