<!DOCTYPE html>
<html>
<head>
    <title>Local Shopping - Shops Near Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#2196F3;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            padding:15px;
            text-align:center;
        }

        .card{
            background:white;
            padding:15px;
            margin:12px auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            max-width:350px;
            text-align:left;
        }

        .btn{
            background:#2196F3;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
            margin-top:8px;
        }

        .input{
            padding:10px;
            width:85%;
            max-width:300px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .note{
            font-size:12px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🛍️ Local Shopping</h1>
    <p>Advanced Delivery System 🚚</p>
</div>

<div class="container">

    <h2>Enable GPS 📍</h2>
    <button class="btn" onclick="getLocation()">Get My Location</button>

    <p id="status" class="note"></p>

    <h2>Order Food 🍔</h2>

    <div class="card">
        <h3>🍅 Tomato (Food)</h3>
        <p>₹30/kg</p>
        <button class="btn" onclick="orderFood()">Order Now</button>
    </div>

    <div class="card">
        <h3>🍞 Bread (Food)</h3>
        <p>₹40</p>
        <button class="btn" onclick="orderFood()">Order Now</button>
    </div>

</div>

<script>

let userLat = null;
let userLon = null;

// Shop fixed location (demo)
let shopLat = 26.5000;
let shopLon = 74.9000;

// GPS
function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(success, error);
    } else {
        alert("GPS not supported");
    }
}

function success(position){
    userLat = position.coords.latitude;
    userLon = position.coords.longitude;

    document.getElementById("status").innerText =
    "Location detected ✔";
}

function error(){
    alert("Please allow location access ❌");
}

// Distance formula (Haversine)
function getDistance(lat1, lon1, lat2, lon2){

    let R = 6371; // km
    let dLat = (lat2-lat1) * Math.PI / 180;
    let dLon = (lon2-lon1) * Math.PI / 180;

    let a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

// Order system
function orderFood(){

    if(userLat == null){
        alert("Please enable GPS first 📍");
        return;
    }

    let distance = getDistance(userLat, userLon, shopLat, shopLon);

    distance = distance.toFixed(2);

    let deliveryFee = Math.round(distance * 5); // ₹5 per km

    if(distance > 5){
        alert("❌ Sorry! Food delivery only within 5 KM\nYour distance: " + distance + " KM");
        return;
    }

    alert(
        "✅ Order Accepted!\n" +
        "Distance: " + distance + " KM\n" +
        "Delivery Fee: ₹" + deliveryFee
    );
}

</script>

</body>
</html>
