<!DOCTYPE html>
<html>
<head>
    <title>Local Shopping - Shops Near Us</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:20px;
        }

        h1{
            color:white;
            background:green;
            padding:15px;
            text-align:center;
        }

        .product{
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:10px;
            border-radius:5px;
        }
    </style>
</head>

<body>

<h1>🛒 Local Shopping - Shops Near Us</h1>

<div class="product">
    <h3>🥛 Milk</h3>
    <p>Price: ₹60</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h3>🍞 Bread</h3>
    <p>Price: ₹40</p>
    <button>Buy Now</button>
</div>

<div class="product">
    <h3>🍚 Rice</h3>
    <p>Price: ₹80/kg</p>
    <button>Buy Now</button>
</div>

</body>
</html>
