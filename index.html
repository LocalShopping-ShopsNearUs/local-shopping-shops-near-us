<!DOCTYPE html>
<html>
<head>
    <title>Local Shopping - Shops Near Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet Map (FREE) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#2196F3;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            padding:15px;
            text-align:center;
        }

        #map{
            height:300px;
            width:100%;
            border-radius:12px;
            margin-top:10px;
        }

        .card{
            background:white;
            padding:15px;
            margin:12px auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            max-width:350px;
            text-align:left;
        }

        .btn{
            background:#2196F3;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
            margin-top:8px;
        }

        .input{
            padding:10px;
            width:85%;
            max-width:300px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>🛍️ Local Shopping</h1>
    <p>Shops Near Us (Map System)</p>
</div>

<div class="container">

    <h2>Your Location 📍</h2>
    <button class="btn" onclick="getLocation()">Show My Location</button>

    <div id="map"></div>

    <h2>Nearby Shops</h2>

    <div class="card">
        <h3>Fresh Grocery Store</h3>
        <p>Vegetables, Fruits, Daily Essentials</p>
        <button class="btn">Order Now</button>
    </div>

    <div class="card">
        <h3>Fashion Hub</h3>
        <p>Clothes, Shoes, Accessories</p>
        <button class="btn">Order Now</button>
    </div>

</div>

<script>

let map;

function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(showMap);
    } else {
        alert("GPS not supported");
    }
}

function showMap(position){

    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    // Create map
    map = L.map('map').setView([lat, lon], 15);

    // OpenStreetMap tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // User marker
    L.marker([lat, lon]).addTo(map)
        .bindPopup("📍 You are here")
        .openPopup();

    // Demo shop markers
    L.marker([lat + 0.002, lon + 0.002]).addTo(map)
        .bindPopup("🛍️ Grocery Shop");

    L.marker([lat - 0.002, lon - 0.002]).addTo(map)
        .bindPopup("👕 Fashion Shop");
}

</script>

</body>
</html>
