<!DOCTYPE html>
<html>
<head>
    <title>Local Shopping - Mega Marketplace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#2196F3;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            padding:15px;
            text-align:center;
        }

        .card{
            background:white;
            padding:15px;
            margin:12px auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            max-width:350px;
            text-align:left;
        }

        .btn{
            background:#2196F3;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
            margin-top:8px;
        }

        .note{
            font-size:12px;
            color:gray;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🛍️ Local Shopping</h1>
    <p>Mega Marketplace 🚚📍</p>
</div>

<div class="container">

    <h2>Enable GPS 📍</h2>
    <button class="btn" onclick="getLocation()">Get My Location</button>
    <p id="status" class="note"></p>

    <h2>All Categories 🏪</h2>

    <div class="card"><h3>🥕 Grocery</h3><button class="btn" onclick="orderFromShop('Grocery')">Order</button></div>
    <div class="card"><h3>👕 Fashion</h3><button class="btn" onclick="orderFromShop('Fashion')">Order</button></div>
    <div class="card"><h3>📱 Mobile</h3><button class="btn" onclick="orderFromShop('Mobile')">Order</button></div>
    <div class="card"><h3>📚 Books</h3><button class="btn" onclick="orderFromShop('Books')">Order</button></div>
    <div class="card"><h3>🎒 Bags</h3><button class="btn" onclick="orderFromShop('Bags')">Order</button></div>
    <div class="card"><h3>🧸 Toys</h3><button class="btn" onclick="orderFromShop('Toys')">Order</button></div>
    <div class="card"><h3>✏️ Stationery</h3><button class="btn" onclick="orderFromShop('Stationery')">Order</button></div>
    <div class="card"><h3>💄 Cosmetics</h3><button class="btn" onclick="orderFromShop('Cosmetics')">Order</button></div>
    <div class="card"><h3>⚽ Sports Items</h3><button class="btn" onclick="orderFromShop('Sports')">Order</button></div>
    <div class="card"><h3>🔌 Electronics</h3><button class="btn" onclick="orderFromShop('Electronics')">Order</button></div>
    <div class="card"><h3>👟 Footwear</h3><button class="btn" onclick="orderFromShop('Footwear')">Order</button></div>
    <div class="card"><h3>🍽️ Kitchen Items</h3><button class="btn" onclick="orderFromShop('Kitchen')">Order</button></div>

</div>

<script>

let userLat = null;
let userLon = null;

// 🏪 Mega shop database
let shops = {
    Grocery:     {lat:26.5000, lon:74.9000, food:true},
    Fashion:     {lat:26.5050, lon:74.9050, food:false},
    Mobile:      {lat:26.5100, lon:74.9100, food:false},
    Books:       {lat:26.5070, lon:74.9020, food:false},
    Bags:        {lat:26.5030, lon:74.9080, food:false},
    Toys:        {lat:26.5090, lon:74.9030, food:false},
    Stationery:  {lat:26.5060, lon:74.9040, food:false},
    Cosmetics:   {lat:26.5040, lon:74.9010, food:false},
    Sports:      {lat:26.5080, lon:74.9090, food:false},
    Electronics: {lat:26.5110, lon:74.9110, food:false},
    Footwear:    {lat:26.5025, lon:74.9070, food:false},
    Kitchen:     {lat:26.5015, lon:74.9060, food:false}
};

function getLocation(){
    if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(success, error);
    } else {
        alert("GPS not supported");
    }
}

function success(position){
    userLat = position.coords.latitude;
    userLon = position.coords.longitude;

    document.getElementById("status").innerText =
    "Location active ✔";
}

function error(){
    alert("Please allow GPS ❌");
}

// 📍 Distance calculation
function getDistance(lat1, lon1, lat2, lon2){

    let R = 6371;

    let dLat = (lat2-lat1) * Math.PI / 180;
    let dLon = (lon2-lon1) * Math.PI / 180;

    let a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;

    let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

    return R * c;
}

// 🛍️ ORDER SYSTEM
function orderFromShop(shopName){

    if(userLat == null){
        alert("Please enable GPS first 📍");
        return;
    }

    let shop = shops[shopName];

    let distance = getDistance(userLat, userLon, shop.lat, shop.lon);
    distance = distance.toFixed(2);

    let deliveryFee = Math.round(distance * 5);

    if(shop.food && distance > 5){
        alert("❌ Food delivery only within 5 KM\nDistance: " + distance + " KM");
        return;
    }

    alert(
        "🛍️ Order Placed!\n" +
        "Shop: " + shopName + "\n" +
        "Distance: " + distance + " KM\n" +
        "Delivery Fee: ₹" + deliveryFee
    );
}

</script>

</body>
</html>
