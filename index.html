<!DOCTYPE html>
<html>
<head>
    <title>Local Shopping - Shops Near Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#2196F3;
            color:white;
            padding:20px;
            text-align:center;
            position:relative;
        }

        .cart-box{
            position:absolute;
            right:15px;
            top:20px;
            background:white;
            color:#2196F3;
            padding:5px 10px;
            border-radius:20px;
            font-weight:bold;
            cursor:pointer;
        }

        .container{
            padding:15px;
            text-align:center;
        }

        .input{
            padding:10px;
            width:85%;
            max-width:300px;
            margin:10px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        .card{
            background:white;
            padding:15px;
            margin:12px auto;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
            max-width:350px;
            text-align:left;
        }

        .btn{
            background:#2196F3;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:8px;
            cursor:pointer;
            margin-top:8px;
        }

        #cartBox{
            display:none;
            background:white;
            padding:15px;
            margin:15px auto;
            max-width:350px;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.2);
        }

        .note{
            color:gray;
            font-size:12px;
        }

    </style>
</head>

<body>

<div class="header">
    <h1>🛍️ Local Shopping</h1>
    <p>Shops Near Us</p>

    <div class="cart-box" onclick="toggleCart()">
        🛒 <span id="cartCount">0</span>
    </div>
</div>

<div class="container">

    <h2>Welcome!</h2>

    <p class="note">Food items delivery radius: 5 KM only 🚚</p>

    <input class="input" type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search products...">

    <h2>Popular Products</h2>

    <div class="card">
        <h3>🍅 Tomato (Food)</h3>
        <p>Price: ₹30/kg</p>
        <button class="btn" onclick="addToCart('Tomato', true)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>🍞 Bread (Food)</h3>
        <p>Price: ₹40</p>
        <button class="btn" onclick="addToCart('Bread', true)">Add to Cart</button>
    </div>

    <div class="card">
        <h3>👕 T-Shirt</h3>
        <p>Price: ₹499</p>
        <button class="btn" onclick="addToCart('T-Shirt', false)">Add to Cart</button>
    </div>

    <div id="cartBox">
        <h3>Your Cart 🛒</h3>
        <ul id="cartList"></ul>

        <p class="note">
            Enter your distance from shop (KM):
        </p>
        <input class="input" type="number" id="distanceInput" placeholder="e.g. 3">

        <button class="btn" onclick="checkout()">Checkout</button>
    </div>

</div>

<script>

let cart = [];

function addToCart(item, isFood){
    cart.push({name:item, food:isFood});
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartUI();
    alert(item + " added to cart 🛒");
}

function updateCartUI(){
    document.getElementById("cartCount").innerText = cart.length;
}

function toggleCart(){
    let box = document.getElementById("cartBox");

    if(box.style.display === "block"){
        box.style.display = "none";
    } else {
        box.style.display = "block";
        showCart();
    }
}

function showCart(){
    let list = document.getElementById("cartList");
    list.innerHTML = "";

    cart.forEach(function(item){
        let li = document.createElement("li");
        li.innerText = item.name;
        list.appendChild(li);
    });
}

function checkout(){
    if(cart.length === 0){
        alert("Cart empty hai 😅");
        return;
    }

    let distance = document.getElementById("distanceInput").value;

    if(distance === ""){
        alert("Please enter distance!");
        return;
    }

    distance = parseFloat(distance);

    // Check food delivery rule
    for(let i=0;i<cart.length;i++){
        if(cart[i].food && distance > 5){
            alert("❌ Food delivery allowed only within 5 KM!\nThis order cannot be delivered.");
            return;
        }
    }

    alert("Order placed successfully 🛒\nTotal items: " + cart.length);

    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartUI();
    showCart();
    toggleCart();
}

function searchProducts() {
    let input = document.getElementById("searchInput");
    let filter = input.value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for (let i = 0; i < cards.length; i++) {
        let text = cards[i].innerText.toLowerCase();

        if (text.includes(filter)) {
            cards[i].style.display = "";
        } else {
            cards[i].style.display = "none";
        }
    }
}

</script>

</body>
</html>
