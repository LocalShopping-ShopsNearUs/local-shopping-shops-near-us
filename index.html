<!DOCTYPE html>
<html>
<head>
<title>Local Shopping - Master App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#2196F3;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:15px;
text-align:center;
}

.card{
background:white;
padding:15px;
margin:12px auto;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.15);
max-width:380px;
text-align:left;
}

.btn{
background:#2196F3;
color:white;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
margin-top:8px;
width:100%;
}

.input{
padding:10px;
width:95%;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

.topbar{
display:flex;
justify-content:space-between;
padding:10px;
background:#fff;
position:sticky;
top:0;
}

#cartBox{
display:none;
background:white;
padding:15px;
margin:15px auto;
max-width:380px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.note{
font-size:12px;
color:gray;
}
</style>
</head>

<body>

<div class="header">
<h1>🛍️ Local Shopping</h1>
<p>Working Master App 🚀</p>
</div>

<div class="topbar">
<button class="btn" onclick="getLocation()">📍 GPS</button>
<button class="btn" onclick="toggleCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
</div>

<div class="container">

<p id="status" class="note"></p>

<h2>🏪 Register Shop</h2>

<div class="card">
<input class="input" id="shopName" placeholder="Shop Name">
<input class="input" id="shopCategory" placeholder="Category">
<input class="input" id="shopLat" placeholder="Latitude">
<input class="input" id="shopLon" placeholder="Longitude">
<button class="btn" onclick="registerShop()">Register</button>
</div>

<h2>🛍️ Shops</h2>
<div id="shopList"></div>

<div id="cartBox">
<h3>🛒 Cart</h3>
<ul id="cartList"></ul>
<button class="btn" onclick="checkout()">Checkout</button>
<p id="orderStatus" class="note"></p>
</div>

</div>

<script>

let userLat = null;
let userLon = null;
let cart = [];

// demo shops
let shops = {
"Kirana Store": {category:"Food", lat:26.5, lon:74.9},
"Medical Store": {category:"Medical", lat:26.51, lon:74.91},
"Cloth Shop": {category:"Fashion", lat:26.52, lon:74.92}
};

// GPS
function getLocation(){
navigator.geolocation.getCurrentPosition(pos=>{
userLat = pos.coords.latitude;
userLon = pos.coords.longitude;
document.getElementById("status").innerText = "GPS Active ✔";
});
}

// REGISTER SHOP
function registerShop(){
let name = document.getElementById("shopName").value;
let cat = document.getElementById("shopCategory").value;
let lat = parseFloat(document.getElementById("shopLat").value);
let lon = parseFloat(document.getElementById("shopLon").value);

if(!name || !cat || !lat || !lon){
alert("Fill all fields");
return;
}

shops[name] = {category:cat, lat:lat, lon:lon};

renderShops();

document.getElementById("shopName").value="";
document.getElementById("shopCategory").value="";
document.getElementById("shopLat").value="";
document.getElementById("shopLon").value="";
}

// SHOW SHOPS
function renderShops(){
let div = document.getElementById("shopList");
div.innerHTML = "";

for(let key in shops){
div.innerHTML += `
<div class="card">
<h3>🏪 ${key}</h3>
<p>Category: ${shops[key].category}</p>
<button class="btn" onclick="addToCart('${key}')">Add to Cart</button>
<button class="btn" onclick="orderShop('${key}')">Order</button>
</div>
`;
}
}

// CART
function addToCart(item){
cart.push(item);
document.getElementById("cartCount").innerText = cart.length;
alert(item + " added 🛒");
}

// SHOW CART
function toggleCart(){
let box = document.getElementById("cartBox");
box.style.display = box.style.display === "block" ? "none" : "block";

let list = document.getElementById("cartList");
list.innerHTML = "";

cart.forEach(i=>{
let li = document.createElement("li");
li.innerText = i;
list.appendChild(li);
});
}

// DISTANCE
function getDistance(lat1, lon1, lat2, lon2){
let R = 6371;
let dLat = (lat2-lat1)*Math.PI/180;
let dLon = (lon2-lon1)*Math.PI/180;

let a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2)*Math.sin(dLon/2);

return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ORDER
function orderShop(name){

if(userLat == null){
alert("GPS ON karo 📍");
return;
}

let shop = shops[name];
let d = getDistance(userLat,userLon,shop.lat,shop.lon).toFixed(2);

alert("Order placed ✔\nDistance: "+d+" KM");

document.getElementById("orderStatus").innerText = "Preparing...";

setTimeout(()=> {
document.getElementById("orderStatus").innerText = "Out for Delivery 🚚";
},2000);

setTimeout(()=> {
document.getElementById("orderStatus").innerText = "Delivered ✅";
},5000);
}

// CHECKOUT
function checkout(){
if(cart.length == 0){
alert("Cart empty");
return;
}

document.getElementById("orderStatus").innerText = "Order Placed ✔";

setTimeout(()=>{
document.getElementById("orderStatus").innerText = "Delivered ✅";
cart = [];
document.getElementById("cartCount").innerText = 0;
},4000);
}

// INIT
renderShops();

</script>

</body>
</html>
